# external-secrets-config — applies the ClusterSecretStore + ExternalSecret CRs.
#
# WHY a SEPARATE app from external-secrets: that app installs only the ESO Helm chart
# (the operator + CRDs). The ClusterSecretStore/ExternalSecret custom resources are
# CONSUMERS of those CRDs, so they must apply AFTER the operator is installed and its
# CRDs are registered — hence sync-wave "2" (operator is wave "1"). Without this app the
# CRs were never applied: the grafana-admin-credentials Secret never materialized and
# Grafana stayed in CreateContainerConfigError.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/c0debyeric/eks-golden-platform.git
    targetRevision: main
    path: gitops/apps/external-secrets
    directory:
      recurse: false
      # Only the CR manifest — NOT values.yaml (that's Helm input for the operator app,
      # not a valid k8s object, and would fail to apply).
      include: clustersecretstore.yaml
  destination:
    server: https://kubernetes.default.svc
    # ClusterSecretStore is cluster-scoped; ExternalSecret carries its own namespace
    # (monitoring). This namespace is just ArgoCD's default target for namespaced objects.
    namespace: external-secrets
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
    # Retry: the ClusterSecretStore may briefly fail if the ESO webhook isn't ready yet.
    retry:
      limit: 5
      backoff: { duration: 10s, factor: 2, maxDuration: 2m }
  # The ExternalSecret CRD defaults many optional fields server-side (conversionStrategy,
  # decodingStrategy, metadataPolicy, target.deletionPolicy, etc.) that aren't in our
  # minimal manifest. ArgoCD would otherwise flag these injected defaults as perpetual
  # drift. Ignore them so the app can reach Synced without us hard-coding every default.
  ignoreDifferences:
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /spec/data
        - /spec/target
        - /spec/refreshInterval
