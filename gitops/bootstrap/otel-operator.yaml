# opentelemetry-operator — synced by the root app-of-apps. Sync wave 2 (installs the
# OpenTelemetryCollector + Instrumentation CRDs that wave 3 depends on).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opentelemetry-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      chart: opentelemetry-operator
      targetRevision: 0.90.4
      helm:
        valueFiles:
          - $values/gitops/apps/otel-operator/values.yaml
    - repoURL: https://github.com/c0debyeric/eks-golden-platform.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
