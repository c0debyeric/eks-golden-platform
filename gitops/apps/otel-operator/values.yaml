# OpenTelemetry Operator values. The operator installs the OpenTelemetryCollector +
# Instrumentation CRDs; the actual collectors are CRs applied in gitops/apps/otel-collector/.
manager:
  # REQUIRED by the chart (default was removed upstream to force an explicit choice):
  # the image the operator uses when a Collector CR doesn't pin its own image. contrib
  # carries the full receiver/exporter/processor set a platform collector needs.
  collectorImage:
    repository: otel/opentelemetry-collector-contrib
  resources:
    requests: { cpu: 50m, memory: 96Mi }
  # The operator's own metrics ServiceMonitor is opt-in; keep it off so the operator never
  # tries to create a ServiceMonitor it doesn't reconcile (older charts crash-looped on the
  # resulting 'already exists' after any restart).
  serviceMonitor:
    enabled: false
# Webhook cert via cert-manager (ArgoCD-native, declarative). We do NOT use the chart's
# autoGenerateCert path because it depends on Helm pre-install hooks that ArgoCD doesn't
# run, leaving the webhook cert secret uncreated (pod FailedMount + untrusted webhook).
# cert-manager (gitops/bootstrap/cert-manager.yaml, sync-wave -1) issues the self-signed
# webhook cert and cainjector keeps the webhook configs' CA bundle in sync automatically.
admissionWebhooks:
  certManager:
    enabled: true
  autoGenerateCert:
    enabled: false
