# The ONLY secret-related resources committed to this PUBLIC repo. They contain NO secret values —
# only POINTERS to AWS Secrets Manager. External Secrets Operator fetches the real values at
# runtime using the Pod Identity association created in Terraform (iam-pod-identity.tf).
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth: {}          # empty => uses the ESO service account's Pod Identity credentials
---
# Materializes the Grafana admin credentials K8s Secret from AWS Secrets Manager.
# Create the source secret once in AWS: `eks-golden/grafana` with keys admin-user, admin-password.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: grafana-admin-credentials   # the K8s Secret kube-prometheus-stack consumes
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: eks-golden/grafana
        property: admin-user
    - secretKey: admin-password
      remoteRef:
        key: eks-golden/grafana
        property: admin-password
