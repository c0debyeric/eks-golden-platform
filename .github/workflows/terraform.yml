# CI for the EKS golden platform. Auth to AWS is via GitHub OIDC — NO stored AWS keys.
#
# Job split reflects the trust scope (role assumable only from ref:refs/heads/main):
#   - lint (any push/PR): fmt + validate. Needs NO AWS creds, so it works on PRs too.
#   - plan (push to main): assumes the AWS role via OIDC and runs `terraform plan`.
name: terraform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required for OIDC: the job must be allowed to mint an OIDC token.
# `contents: read` is least-privilege for checkout.
permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.15.8" # latest stable; satisfies use_lockfile (>= 1.11) + provider majors
  AWS_REGION: us-east-1

jobs:
  # Syntax + formatting. No cloud access — safe to run on untrusted PRs.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: terraform fmt
        run: terraform -chdir=terraform fmt -check -recursive
      - name: terraform validate
        # -backend=false: validate syntax + provider schema without touching remote state.
        run: |
          terraform -chdir=terraform init -backend=false -input=false
          terraform -chdir=terraform validate

  # Plan against the real account. Only on main, where the OIDC role trust allows it.
  plan:
    if: github.ref == 'refs/heads/main'
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Exchanges the GitHub OIDC token for short-lived AWS creds. No secrets stored.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }} # repo variable, set from bootstrap output
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-${{ github.run_id }}

      - name: Verify identity
        run: aws sts get-caller-identity

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Backend config passed inline (bucket name + region are NOT secret). use_lockfile is in
      # the versions.tf backend block. Set the TF_STATE_BUCKET repo variable to your state bucket.
      - name: terraform init
        run: |
          terraform -chdir=terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=eks-golden-platform/terraform.tfstate" \
            -backend-config="region=${{ env.AWS_REGION }}"
      - name: terraform plan
        # Plan scope: the AWS INFRASTRUCTURE layer only (VPC, EKS, Karpenter, IAM, RDS,
        # storage). We deliberately -target these modules/resources and EXCLUDE the in-cluster
        # resources (helm_release.argocd, kubectl_manifest.root_app) for two reasons:
        #   1. Those are GitOps-managed — ArgoCD reconciles cluster state from Git, so Terraform
        #      planning them in CI adds no review value.
        #   2. The CI OIDC role can auth to the K8s API but AmazonEKSViewPolicy can't read
        #      ArgoCD CRDs (applications.argoproj.io), so refreshing them fails; and CI lacks the
        #      gitignored tfvars, so a full plan shows a spurious RDS teardown.
        # -lock=false: a read-only plan must not acquire the S3 state lock (else it races/blocks
        # any concurrent `terraform apply` with a 412 PreconditionFailed).
        run: |
          terraform -chdir=terraform plan -input=false -no-color -lock=false \
            -target=module.vpc \
            -target=module.eks \
            -target=module.karpenter \
            -target=aws_vpc_endpoint.s3 \
            -target=aws_iam_role.external_secrets \
            -target=aws_iam_role.alb_controller \
            -target=aws_iam_role.ebs_csi \
            -target=aws_iam_role.loki \
            -target=aws_s3_bucket.loki

